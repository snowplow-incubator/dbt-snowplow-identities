version: 2

unit_tests:

  - name: test__snowplow_identities_identifier_mapping__repoint_existing_on_merge
    description: >
      Regression test. In batch 1, sp_BBBB was created and its
      domain_userid=user-bbb was stored in the identifier_mapping table.
      In batch 2, sp_BBBB is merged into sp_AAAA but no new events arrive
      for sp_BBBB. The model must re-point the existing identifier row
      from active_snowplow_id=sp_BBBB to sp_AAAA.
    model: snowplow_identities_identifier_mapping
    overrides:
      macros:
        is_incremental: true
        snowplow_utils.is_run_with_new_events: "true"
    given:
      - input: ref('snowplow_identities_identifier_mapping_this_run')
        rows: []
      - input: ref('snowplow_identities_snowplow_id_mapping_this_run')
        rows:
          - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-19 14:00:00.000', model_tstamp: '2025-12-19 14:05:00.000'}
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows:
          - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-19 14:00:00.000', model_tstamp: '2025-12-19 14:05:00.000'}
      - input: this
        rows:
          - {uuid: 'uuid-bbb', active_snowplow_id: 'sp_BBBB', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-002'}
    expect:
      rows:
        - {uuid: 'uuid-bbb', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-002'}

  - name: test__snowplow_identities_identifier_mapping__merge_with_new_events_for_absorbed_identity
    description: >
      In batch 1, sp_BBBB was created with domain_userid=user-bbb.
      In batch 2, sp_BBBB merges into sp_AAAA and new events also
      arrive for sp_BBBB in the same batch (e.g. a page view tracked
      just before the merge). The identifier row should be updated
      from the new events (not duplicated by the re-pointing path),
      and correctly point to sp_AAAA.
    model: snowplow_identities_identifier_mapping
    overrides:
      macros:
        is_incremental: true
        snowplow_utils.is_run_with_new_events: "true"
    given:
      - input: ref('snowplow_identities_identifier_mapping_this_run')
        rows:
          - {uuid: 'uuid-bbb', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-19 14:00:00.000', first_seen_event_id: 'evt-new'}
      - input: ref('snowplow_identities_snowplow_id_mapping_this_run')
        rows:
          - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-19 14:00:00.000', model_tstamp: '2025-12-19 14:05:00.000'}
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows:
          - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-19 14:00:00.000', model_tstamp: '2025-12-19 14:05:00.000'}
      - input: this
        rows:
          - {uuid: 'uuid-bbb', active_snowplow_id: 'sp_BBBB', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-002'}
    expect:
      rows:
        - {uuid: 'uuid-bbb', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-19 14:00:00.000', first_seen_event_id: 'evt-002'}

  - name: test__snowplow_identities_identifier_mapping__preserve_first_seen_at
    description: >
      A user visits on Monday (first_seen_at=Monday, last_seen_at=Monday).
      The same identifier appears again on Wednesday in a new batch.
      The table should preserve first_seen_at=Monday and update
      last_seen_at=Wednesday.
    model: snowplow_identities_identifier_mapping
    overrides:
      macros:
        is_incremental: true
        snowplow_utils.is_run_with_new_events: "true"
    given:
      - input: ref('snowplow_identities_identifier_mapping_this_run')
        rows:
          - {uuid: 'uuid-aaa', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-17 10:00:00.000', last_seen_at: '2025-12-19 14:00:00.000', first_seen_event_id: 'evt-wed'}
      - input: ref('snowplow_identities_snowplow_id_mapping_this_run')
        rows: []
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows: []
      - input: this
        rows:
          - {uuid: 'uuid-aaa', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-15 10:00:00.000', last_seen_at: '2025-12-15 10:00:00.000', first_seen_event_id: 'evt-mon'}
    expect:
      rows:
        - {uuid: 'uuid-aaa', active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-15 10:00:00.000', last_seen_at: '2025-12-19 14:00:00.000', first_seen_event_id: 'evt-mon'}

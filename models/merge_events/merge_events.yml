version: 2
models:
  - name: snowplow_identities_merge_events
    description: '{{ doc("table_merge_events") }}'
    columns:
      - name: merge_event_id
        description: 'The unique identifier for the merge event.'
        tests:
          - unique
          - not_null
      - name: active_snowplow_id
        description: 'The latest snowplow_id as a result of the given merge event.'
        tests:
          - not_null
      - name: collector_tstamp
        description: '{{ doc("col_collector_tstamp") }}'
      - name: derived_tstamp
        description: '{{ doc("col_derived_tstamp") }}'
      - name: merged
        description: 'The full identity hierarchy resolution history for the given merge event.'
      - name: merges
        description: 'The list of individual merges that were part of the given merge event.'

version: 2

unit_tests:

  - name: test__snowplow_identities_snowplow_id_mapping_this_run__simple_merge
    description: >
      One merge event absorbs sp_BBBB into sp_AAAA.
      Expects a single mapping row: sp_BBBB → sp_AAAA.
    model: snowplow_identities_snowplow_id_mapping_this_run
    config:
      tags: ["snowflake_only"]
    given:
      - input: ref('snowplow_identities_merge_events_this_run')
        format: sql
        rows: |
          select
            'evt-003' as merge_event_id,
            'sp_AAAA' as active_snowplow_id,
            parse_json('[{"snowplow_id":"sp_BBBB","created_at":"2025-12-18T10:01:00.500Z","merged_at":"2025-12-18T10:02:00.000Z","triggering_event_id":"evt-003"}]') as merged,
            parse_json('["sp_BBBB"]') as merges,
            '2025-12-18 10:02:00.100'::timestamp as collector_tstamp,
            '2025-12-18 10:02:00.000'::timestamp as derived_tstamp
    # model_tstamp is omitted: uses current_timestamp_in_utc() which
    # cannot be overridden in dbt-fusion unit tests.
    expect:
      rows:
        - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-18 10:02:00.000'}

  # FAILING — documents expected behavior not yet implemented.
  # Each merge event only knows its direct merges. When sp_AAAA→sp_BBBB
  # and then sp_BBBB→sp_CCCC arrive as separate events, the model should
  # resolve both to sp_CCCC. Currently sp_AAAA is dropped because sp_BBBB
  # is not a "true parent".
  - name: test__snowplow_identities_snowplow_id_mapping_this_run__transitive_chain
    description: >
      Transitive merge chain: sp_AAAA merged into sp_BBBB (evt-010),
      then sp_BBBB merged into sp_CCCC (evt-020). Each merge event only
      contains its direct child. The model should resolve both sp_AAAA
      and sp_BBBB to sp_CCCC.
    model: snowplow_identities_snowplow_id_mapping_this_run
    config:
      tags: ["snowflake_only"]
    given:
      - input: ref('snowplow_identities_merge_events_this_run')
        format: sql
        rows: |
          select
            'evt-010' as merge_event_id,
            'sp_BBBB' as active_snowplow_id,
            parse_json('[{"snowplow_id":"sp_AAAA","created_at":"2025-12-18T10:00:00.500Z","merged_at":"2025-12-18T10:02:00.000Z","triggering_event_id":"evt-010"}]') as merged,
            parse_json('["sp_AAAA"]') as merges,
            '2025-12-18 10:02:00.100'::timestamp as collector_tstamp,
            '2025-12-18 10:02:00.000'::timestamp as derived_tstamp
          union all
          select
            'evt-020',
            'sp_CCCC',
            parse_json('[{"snowplow_id":"sp_BBBB","created_at":"2025-12-18T10:01:00.500Z","merged_at":"2025-12-18T10:05:00.000Z","triggering_event_id":"evt-020"}]'),
            parse_json('["sp_BBBB"]'),
            '2025-12-18 10:05:00.100'::timestamp,
            '2025-12-18 10:05:00.000'::timestamp
    # model_tstamp is omitted: uses current_timestamp_in_utc() which
    # cannot be overridden in dbt-fusion unit tests.
    expect:
      rows:
        - {snowplow_id: 'sp_AAAA', active_snowplow_id: 'sp_CCCC', merged_at: '2025-12-18 10:02:00.000'}
        - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_CCCC', merged_at: '2025-12-18 10:05:00.000'}

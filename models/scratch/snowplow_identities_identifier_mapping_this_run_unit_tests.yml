version: 2

unit_tests:

  - name: test__snowplow_identities_identifier_mapping_this_run__two_users_merged
    description: >
      sp_AAAA (domain_userid=user-aaa) and sp_BBBB (domain_userid=user-bbb)
      are created, then sp_BBBB is merged into sp_AAAA. Both domain_userid
      values should resolve to active_snowplow_id=sp_AAAA.
    model: snowplow_identities_identifier_mapping_this_run
    config:
      tags: ["snowflake_only"]
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('snowplow_identities_new_identifiers_this_run')
        format: sql
        rows: |
          select
            'sp_AAAA' as snowplow_id, 'DOMAIN_USERID' as id_type, 'user-aaa' as id_value,
            'evt-001' as first_seen_event_id, 'web' as first_app_id, 'web' as last_app_id,
            '2025-12-18 10:00:00.000'::timestamp as first_derived_tstamp,
            '2025-12-18 10:00:10.000'::timestamp as last_derived_tstamp
          union all
          select
            'sp_BBBB', 'DOMAIN_USERID', 'user-bbb',
            'evt-002', 'web', 'web',
            '2025-12-18 10:01:00.000'::timestamp,
            '2025-12-18 10:01:10.000'::timestamp
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows:
          - {snowplow_id: 'sp_BBBB', active_snowplow_id: 'sp_AAAA', merged_at: '2025-12-18 10:02:00.000', model_tstamp: '2025-12-18 10:05:00.000'}
    # uuid is omitted: surrogate key (non-deterministic hash)
    expect:
      rows:
        - {active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-001'}
        - {active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-bbb', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:01:00.000', last_seen_at: '2025-12-18 10:01:10.000', first_seen_event_id: 'evt-002'}

  - name: test__snowplow_identities_identifier_mapping_this_run__multiple_identifier_types
    description: >
      sp_AAAA has both domain_userid and user_id. The model should
      produce two separate rows, one per identifier type.
    model: snowplow_identities_identifier_mapping_this_run
    config:
      tags: ["snowflake_only"]
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('snowplow_identities_new_identifiers_this_run')
        format: sql
        rows: |
          select
            'sp_AAAA' as snowplow_id, 'DOMAIN_USERID' as id_type, 'user-aaa' as id_value,
            'evt-001' as first_seen_event_id, 'web' as first_app_id, 'web' as last_app_id,
            '2025-12-18 10:00:00.000'::timestamp as first_derived_tstamp,
            '2025-12-18 10:00:10.000'::timestamp as last_derived_tstamp
          union all
          select
            'sp_AAAA', 'USER_ID', 'john@example.com',
            'evt-001', 'web', 'web',
            '2025-12-18 10:00:00.000'::timestamp,
            '2025-12-18 10:00:10.000'::timestamp
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows: []
    # uuid is omitted: surrogate key (non-deterministic hash)
    expect:
      rows:
        - {active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-001'}
        - {active_snowplow_id: 'sp_AAAA', id_type: 'USER_ID', id_value: 'john@example.com', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:00:10.000', first_seen_event_id: 'evt-001'}

  - name: test__snowplow_identities_identifier_mapping_this_run__first_seen_event_per_identifier
    description: >
      sp_AAAA has two events: evt-001 has domain_userid only, evt-002
      adds user_id. Each identifier should get the event_id of the event
      that actually introduced it:
      domain_userid=user-aaa → evt-001, user_id=john123 → evt-002.
    model: snowplow_identities_identifier_mapping_this_run
    config:
      tags: ["snowflake_only"]
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('snowplow_identities_new_identifiers_this_run')
        format: sql
        rows: |
          select
            'sp_AAAA' as snowplow_id, 'DOMAIN_USERID' as id_type, 'user-aaa' as id_value,
            'evt-001' as first_seen_event_id, 'web' as first_app_id, 'mobile' as last_app_id,
            '2025-12-18 10:00:00.000'::timestamp as first_derived_tstamp,
            '2025-12-18 10:01:00.000'::timestamp as last_derived_tstamp
          union all
          select
            'sp_AAAA', 'USER_ID', 'john123',
            'evt-002', 'mobile', 'mobile',
            '2025-12-18 10:01:00.000'::timestamp,
            '2025-12-18 10:01:00.000'::timestamp
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows: []
    expect:
      rows:
        - {active_snowplow_id: 'sp_AAAA', id_type: 'DOMAIN_USERID', id_value: 'user-aaa', first_app_id: 'web', last_app_id: 'mobile', first_seen_at: '2025-12-18 10:00:00.000', last_seen_at: '2025-12-18 10:01:00.000', first_seen_event_id: 'evt-001'}
        - {active_snowplow_id: 'sp_AAAA', id_type: 'USER_ID', id_value: 'john123', first_app_id: 'mobile', last_app_id: 'mobile', first_seen_at: '2025-12-18 10:01:00.000', last_seen_at: '2025-12-18 10:01:00.000', first_seen_event_id: 'evt-002'}

  - name: test__snowplow_identities_identifier_mapping_this_run__same_identifier_across_merged_ids
    description: >
      Two snowplow_ids carry the same identifier value (duid_XBT_C). One is
      seen first at 00:00:01 (sp_GTRZ), the other at 00:00:02 (sp_KKHE).
      After merging, both map to the same active_snowplow_id, collapsing
      into a single group. first_seen_event_id and first_app_id must come
      from the row with the earliest timestamp, not an arbitrary row.
    model: snowplow_identities_identifier_mapping_this_run
    config:
      tags: ["snowflake_only"]
    overrides:
      macros:
        is_incremental: false
    given:
      - input: ref('snowplow_identities_new_identifiers_this_run')
        format: sql
        rows: |
          select
            'sp_GTRZ3727UNLKNHQX4FTX7VWV2I' as snowplow_id, 'DOMAIN_USERID' as id_type, 'duid_XBT_C' as id_value,
            '958a7b03-ed83-4381-9245-21ccf58c2b6f' as first_seen_event_id, 'web' as first_app_id, 'web' as last_app_id,
            '2020-01-04 00:00:01.000'::timestamp as first_derived_tstamp,
            '2020-01-04 00:00:01.000'::timestamp as last_derived_tstamp
          union all
          select
            'sp_KKHEIXJLSFKH5F5APFXTGWIWBU', 'DOMAIN_USERID', 'duid_XBT_C',
            '163fac78-90fc-40b2-9176-edba817e1e24', 'web', 'web',
            '2020-01-04 00:00:02.000'::timestamp,
            '2020-01-04 00:00:02.000'::timestamp
      - input: ref('snowplow_identities_snowplow_id_mapping')
        rows:
          - {snowplow_id: 'sp_GTRZ3727UNLKNHQX4FTX7VWV2I', active_snowplow_id: 'sp_KKHEIXJLSFKH5F5APFXTGWIWBU', merged_at: '2020-01-04 00:00:02.000', model_tstamp: '2020-01-04 00:00:02.000'}
    expect:
      rows:
        - {active_snowplow_id: 'sp_KKHEIXJLSFKH5F5APFXTGWIWBU', id_type: 'DOMAIN_USERID', id_value: 'duid_XBT_C', first_app_id: 'web', last_app_id: 'web', first_seen_at: '2020-01-04 00:00:01.000', last_seen_at: '2020-01-04 00:00:02.000', first_seen_event_id: '958a7b03-ed83-4381-9245-21ccf58c2b6f'}

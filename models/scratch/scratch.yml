version: 2

models:
  - name: snowplow_identities_id_changes_this_run
    description: '{{ doc("table_id_changes_this_run") }}'
    columns:
      - name: id_change_key
        description: 'A unique identifier for the identity change record.'
        tests:
          - not_null
          - unique
      - name: snowplow_id
        description: 'The snowplow_id after the change. For merges, this is the parent/canonical ID. For creates, this is the new ID.'
        tests:
          - not_null
      - name: previous_snowplow_id
        description: 'The ID that was merged into snowplow_id (NULL for new ID creation).'
      - name: active_snowplow_id
        description: 'The canonical parent ID. Same as snowplow_id (included for consistency with SCD model).'
        tests:
          - not_null
      - name: effective_at
        description: 'Event time - when this change actually occurred (from derived_tstamp for creates, merged_at for merges).'
        tests:
          - not_null
      - name: changed_at
        description: 'Processing time - when dbt materialized this record.'
      - name: change_type
        description: 'Indicates whether the record was created due to a new identity creation or a merge event.'
      - name: first_seen_event_id
        description: 'The event that triggered this change.'
      - name: first_seen_app_id
        description: 'The app_id where this change originated.'
  - name: snowplow_identities_identifier_mapping_this_run
    description: '{{ doc("table_identifier_mapping_this_run") }}'
    columns:
      - name: uuid
        description: 'A unique identifier for the mapping record.'
        tests:
          - not_null
          - unique
      - name: active_snowplow_id
        description: 'The current, canonical Snowplow ID after considering all merges in the current run.'
        tests:
          - not_null
      - name: id_type
        description: 'The type of identifier (e.g., "email", "user_id", "domain_userid") associated with the snowplow_id.'
      - name: id_value
        description: 'The actual (or hashed) identifier value.'
      - name: first_app_id
        description: 'The app_id of the event where this id was first observed in the current run.'
      - name: last_app_id
        description: 'The app_id of the event where this id was most recently observed  in the current run.'
      - name: first_seen_at
        description: 'The derived_tstamp from the first event associated with this snowplow_id in the current run.'
      - name: last_seen_at
        description: 'The derived_tstamp from the last event associated with this snowplow_id in the current run.'
      - name: first_seen_event_id
        description: 'The first event that contributed this identifier to the mapping in the current run.'
  - name: snowplow_identities_snowplow_id_mapping_this_run
    description: '{{ doc("table_snowplow_id_mapping_this_run") }}'
    columns:
      - name: snowplow_id
        description: 'A Snowplow ID currently represented by the canonical active_snowplow_id after considering all merges in the current run.'
        tests:
          - not_null
          - unique
      - name: active_snowplow_id
        description: 'The current, canonical snowplow_id after considering all merges in the current run.'
      - name: merged_at
        description: 'The timestamp when the identifier was merged.'
      - name: model_tstamp
        description: 'The timestamp when this record was created in the model.'

version: 2

sources:
  # The _affected snapshot is written by a pre-hook on
  # snowplow_identities_snowplow_id_mapping via
  # `CREATE OR REPLACE TABLE {{ this.schema }}.{{ this.identifier }}_affected`.
  # Its schema must match the schema dbt resolves for that model —
  # target.schema + '_derived' under default generate_schema_name. If a
  # downstream user overrides generate_schema_name, both this declaration
  # and the pre-hook's {{ this.schema }} must be kept in lockstep.
  - name: snowplow_identities_internal
    description: >
      Internal snapshots created via pre-hooks. Not managed as dbt models,
      but declared here so refs stay explicit and parse-time-checked.
    schema: "{{ target.schema }}_derived"
    tables:
      - name: snowplow_id_mapping_affected
        identifier: snowplow_identities_snowplow_id_mapping_affected
        description: >
          Snapshot of rows from snowplow_identities_snowplow_id_mapping that
          are about to be re-rooted in the current run. Populated by the
          pre-hook on snowplow_identities_snowplow_id_mapping before its
          incremental merge.
        columns:
          - name: snowplow_id
            description: The child identity whose root is about to change.
            data_type: string
            tests:
              - unique
              - not_null
          - name: active_snowplow_id
            description: The parent it pointed at before this run.
            data_type: string
            tests:
              - not_null
          - name: merged_at
            description: Pre-run merged_at.
            data_type: timestamp
          - name: model_tstamp
            description: Pre-run model_tstamp.
            data_type: timestamp

models:
  - name: snowplow_identities_id_changes_this_run
    description: '{{ doc("table_id_changes_this_run") }}'
    columns:
      - name: id_change_key
        description: 'A unique identifier for the identity change record.'
        tests:
          - not_null
          - unique
      - name: snowplow_id
        description: 'The snowplow_id after the change. For merges, this is the parent/canonical ID. For creates, this is the new ID.'
        tests:
          - not_null
      - name: previous_snowplow_id
        description: 'The ID that was merged into snowplow_id (NULL for new ID creation).'
      - name: effective_at
        description: 'Event time - when this change actually occurred (from derived_tstamp for creates, merged_at for merges).'
        tests:
          - not_null
      - name: changed_at
        description: 'Processing time - when dbt materialized this record.'
      - name: change_type
        description: 'Indicates whether the record was created due to a new identity creation or a merge event.'
      - name: first_seen_event_id
        description: 'The event that triggered this change.'
      - name: first_seen_app_id
        description: 'The app_id where this change originated.'
  - name: snowplow_identities_new_identifiers_this_run
    description: >
      Event-level UNPIVOT of identifier columns, aggregated per
      (snowplow_id, id_type, id_value). Provides correct per-identifier
      first_seen_event_id attribution.
    columns:
      - name: snowplow_id
        description: 'The Snowplow identity ID from the event context.'
      - name: id_type
        description: 'The type of identifier (e.g., DOMAIN_USERID, USER_ID).'
      - name: id_value
        description: 'The identifier value.'
      - name: first_seen_event_id
        description: 'The first event that contributed this specific identifier.'
      - name: first_app_id
        description: 'The app_id of the first event where this identifier was observed.'
      - name: last_app_id
        description: 'The app_id of the last event where this identifier was observed.'
      - name: first_derived_tstamp
        description: 'The derived_tstamp of the first event where this identifier was observed.'
      - name: last_derived_tstamp
        description: 'The derived_tstamp of the last event where this identifier was observed.'
  - name: snowplow_identities_identifier_mapping_this_run
    description: '{{ doc("table_identifier_mapping_this_run") }}'
    columns:
      - name: uuid
        description: 'A unique identifier for the mapping record.'
        tests:
          - not_null
          - unique
      - name: active_snowplow_id
        description: 'The current, canonical Snowplow ID after considering all merges in the current run.'
        tests:
          - not_null
      - name: id_type
        description: 'The type of identifier (e.g., "email", "user_id", "domain_userid") associated with the snowplow_id.'
      - name: id_value
        description: 'The actual (or hashed) identifier value.'
      - name: first_app_id
        description: 'The app_id of the event where this id was first observed in the current run.'
      - name: last_app_id
        description: 'The app_id of the event where this id was most recently observed  in the current run.'
      - name: first_seen_at
        description: 'The derived_tstamp from the first event associated with this snowplow_id in the current run.'
      - name: last_seen_at
        description: 'The derived_tstamp from the last event associated with this snowplow_id in the current run.'
      - name: first_seen_event_id
        description: 'The first event that contributed this identifier to the mapping in the current run.'
  - name: snowplow_identities_snowplow_id_mapping_this_run
    description: '{{ doc("table_snowplow_id_mapping_this_run") }}'
    columns:
      - name: snowplow_id
        description: 'A Snowplow ID currently represented by the canonical active_snowplow_id after considering all merges in the current run.'
        tests:
          - not_null
          - unique
      - name: active_snowplow_id
        description: 'The current, canonical snowplow_id after considering all merges in the current run.'
      - name: merged_at
        description: 'The timestamp when the identifier was merged.'
      - name: model_tstamp
        description: 'The timestamp when this record was created in the model.'

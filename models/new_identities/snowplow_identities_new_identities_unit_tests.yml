version: 2

unit_tests:

  - name: test__snowplow_identities_new_identities__preserve_historical_values
    description: >
      Incremental: sp_AAAA was seen in run 1 with user_id=alice@co,
      first_app_id=web, first_derived_tstamp=10:00. In run 2 the same
      snowplow_id appears from a later batch with user_id=NULL and
      first_derived_tstamp=10:30. The model should preserve the earlier
      first_* values and the non-NULL user_id from run 1, while updating
      last_* values from run 2.
    model: snowplow_identities_new_identities
    config:
      tags: ["snowflake_only"]
    overrides:
      macros:
        is_incremental: true
        snowplow_utils.is_run_with_new_events: "true"
    given:
      - input: ref('snowplow_identities_new_identities_this_run')
        rows:
          - {snowplow_id: 'sp_AAAA', created_at: '2025-12-18 10:00:00.500', first_seen_event_id: 'evt-008', first_app_id: 'ios', last_app_id: 'ios', domain_userid: 'user-aaa', user_id: null, first_derived_tstamp: '2025-12-18 10:30:00.000', last_derived_tstamp: '2025-12-18 10:30:00.000'}
      - input: this
        rows:
          - {snowplow_id: 'sp_AAAA', created_at: '2025-12-18 10:00:00.500', first_seen_event_id: 'evt-001', first_app_id: 'web', last_app_id: 'web', domain_userid: 'user-aaa', user_id: 'alice@co', first_derived_tstamp: '2025-12-18 10:00:00.000', last_derived_tstamp: '2025-12-18 10:00:00.000'}
    expect:
      rows:
        - {snowplow_id: 'sp_AAAA', created_at: '2025-12-18 10:00:00.500', first_seen_event_id: 'evt-001', first_app_id: 'web', last_app_id: 'ios', domain_userid: 'user-aaa', user_id: 'alice@co', first_derived_tstamp: '2025-12-18 10:00:00.000', last_derived_tstamp: '2025-12-18 10:30:00.000'}

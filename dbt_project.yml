name: 'snowplow_identities'
version: '0.0.2'
config-version: 2

require-dbt-version: [">=1.6.0", "<2.0.0"]

profile: 'default'

dispatch:
  - macro_namespace: dbt
    search_order: ['snowplow_utils', 'dbt']

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
docs-paths: ["docs"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  snowplow_identities:
    +materialized: table
    +file_format:  "{{ 'delta' if target.type not in ['spark'] else 'iceberg'}}"
    +incremental_strategy: "{{ None if target.type not in ['spark'] else 'merge' }}"
    +bind: false
    +tags: "snowplow_identities_incremental"
    +schema: "derived"
    base:
      +tags: "base"
      manifest:
        +schema: "snowplow_manifest"
      scratch:
        +schema: "scratch"
        +tags: "scratch"
    merge_events:
      +schema: "derived"
      +tags: "snowplow_identities_incremental"
      scratch:
        +schema: "scratch"
        +tags: "scratch"
    new_identities:
      +schema: "derived"
      +tags: "snowplow_identities_incremental"
      scratch:
        +schema: "scratch"
        +tags: "scratch"
    scratch:
      +schema: "scratch"
      +tags: "scratch"

vars:
  snowplow_identities:
    # OPERATION & LOGIC
    snowplow__allow_refresh: false #  If set to true, the incremental manifest will be dropped when running with a `--full-refresh` flag
    snowplow__dev_target_name: dev # If the target matches the dev target, there is no need to set the snowplow__allow_refresh to true to drop the manifest table as well
    snowplow__app_id: [] # List of app_ids to filter events on. Empty list means no filtering.
    snowplow__hash_identifiers: false # Set to true to hash identifiers before processing (recommended for PII compliance)
    snowplow__identifiers: [{'reference': 'domain_userid', 'alias': 'domain_userid'}, {'reference': 'user_id', 'alias': 'user_id'}] # List of identifiers to process.
    snowplow__backfill_limit_days: 30
    snowplow__scd_lookback_days: 1 # Number of days to look back when reprocessing SCD records

    # WAREHOUSE & TRACKER
    snowplow__databricks_catalog: "hive_metastore"
    # snowplow__atomic_schema: 'atomic' # Only set if not using 'atomic' schema for Snowplow events data
    # snowplow__database: # Only set if not using target.database for Snowplow events data -- WILL BE IGNORED FOR DATABRICKS
    # snowplow__events_table: "events" # Only set if not using 'events' table for Snowplow events data
    # PRIVATE VARS - DO NOT MODIFY
    snowplow__events: "{{ source('atomic', 'events') }}"
    
    # LICENSE
    snowplow__license_accepted: false

on-run-start:
  - "{{ snowplow_utils.snowplow_delete_from_manifest(var('models_to_remove',[])) }}"
  - "{{ snowplow_utils.license_check(var('snowplow__license_accepted')) }}"
on-run-end:
  - "{{ snowplow_utils.snowplow_incremental_post_hook_t(package_name='snowplow_identities', incremental_manifest_table_name='snowplow_identities_incremental_manifest', base_events_this_run_table_name='snowplow_identities_base_events_this_run') }}"
  - "{{ snowplow_utils.grant_usage_on_schemas_built_into(var('snowplow__grant_schemas', true)) }}"

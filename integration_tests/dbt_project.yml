name: 'snowplow_identities_integration_tests'
version: '0.0.1'
config-version: 2

profile: 'integration_tests'

dispatch:
  - macro_namespace: dbt
    search_order: ['snowplow_utils', 'dbt']

model-paths:
  - models
test-paths:
  - tests
seed-paths:
  - data
macro-paths:
  - macros
clean-targets:
  - target
  - dbt_modules
  - dbt_packages


quoting:
  identifier: false
  schema: false


models:
  snowplow_identities_integration_tests:
    +materialized: table
    +schema: "snplw_identities_int_tests"
    +source:
    +bind: false
vars:
  snowplow_identities:
    snowplow__allow_null_dvce_tstamps: true
    snowplow__atomic_schema: "{{ target.schema ~ '_snplw_identities_int_tests' }}"
    snowplow__events_table: snowplow_identities_events_stg
    snowplow__start_date: '2020-01-02'
    snowplow__backfill_limit_days: 1
    snowplow__databricks_catalog: hive_metastore
    snowplow__license_accepted: true
    snowplow__identifiers: [{'reference': 'domain_userid', 'alias': 'domain_userid'}, {'reference': 'user_id', 'alias': 'user_id'}, {'reference': 'network_userid', 'alias': 'network_userid'}]
    snowplow__app_id: []
seeds:
  snowplow_identities_integration_tests:
    +schema: "snplw_identities_int_tests"
    source:
      snowplow_identities_events:
        +column_types:
          app_id: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar' }}"
          name_tracker: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar' }}"
          domain_userid: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar' }}"
          user_id: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar' }}"
          network_userid: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar' }}"
          collector_tstamp: timestamp
          derived_tstamp: timestamp
          dvce_created_tstamp: timestamp
          load_tstamp: timestamp
          contexts_com_snowplowanalytics_snowplow_identity_1: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar(65535)' }}"
          unstruct_event_com_snowplowanalytics_snowplow_identity_merge_1: "{{ 'string' if target.type in ['bigquery', 'databricks', 'spark'] else 'varchar(65535)' }}"
    expected:
      +column_types:
        collector_tstamp: timestamp
        derived_tstamp: timestamp
        merged_at: timestamp
        effective_at: timestamp
        superseded_at: timestamp
        first_seen_at: timestamp
        last_seen_at: timestamp
        first_derived_tstamp: timestamp
        last_derived_tstamp: timestamp
        created_at: timestamp
  +quote_columns: false
flags:
  require_generic_test_arguments_property: true

version: 2

models:
  # Group 1: Basic
  - name: basic_new_identities_actual
    tests:
      - dbt_utils.equal_rowcount:
          config:
            tags: ['basic']
          arguments:
            compare_model: ref('basic_new_identities_expected_stg')
      - dbt_utils.equality:
          config:
            tags: ['basic']
          arguments:
            compare_model: ref('basic_new_identities_expected_stg')
            compare_columns:
              - snowplow_id
              - created_at
              - first_seen_event_id
              - first_app_id
              - last_app_id
              - domain_userid
              - user_id
              - first_derived_tstamp
              - last_derived_tstamp
  - name: basic_snowplow_id_mapping_actual
    tests:
      - dbt_utils.equal_rowcount:

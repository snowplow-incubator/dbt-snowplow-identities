version: 2

models:
  # Group 1: Basic
  - name: basic_new_identities_actual
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('basic_new_identities_expected_stg')
          tags: ['basic']
      - dbt_utils.equality:
          compare_model: ref('basic_new_identities_expected_stg')
          compare_columns:
            - snowplow_id
            - created_at
            - first_seen_event_id
            - first_app_id
            - last_app_id
            - domain_userid
            - user_id
            - first_derived_tstamp
            - last_derived_tstamp
          tags: ['basic']
  - name: basic_snowplow_id_mapping_actual
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('basic_snowplow_id_mapping_expected_stg')
          tags: ['basic']
      - dbt_utils.equality:
          compare_model: ref('basic_snowplow_id_mapping_expected_stg')
          compare_columns:
            - snowplow_id
            - active_snowplow_id
            - merged_at
          tags: ['basic']
  - name: basic_id_changes_actual

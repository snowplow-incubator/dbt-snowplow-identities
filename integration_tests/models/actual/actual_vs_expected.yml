            compare_model: ref('basic_id_changes_expected_stg')
            compare_columns:
              - snowplow_id
              - previous_snowplow_id
              - effective_at
              - change_type
              - first_seen_event_id
              - first_seen_app_id
  - name: basic_id_mapping_scd_actual
    tests:
      - dbt_utils.equal_rowcount:
          config:
            tags: ['basic']
          arguments:
            compare_model: ref('basic_id_mapping_scd_expected_stg')
      - dbt_utils.equality:

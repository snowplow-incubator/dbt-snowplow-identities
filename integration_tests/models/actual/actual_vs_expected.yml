      - dbt_utils.equality:
          config:
            tags: ['basic']
          arguments:
            compare_model: ref('basic_snowplow_id_mapping_expected_stg')
            compare_columns:
              - snowplow_id
              - active_snowplow_id
              - merged_at
  - name: basic_id_changes_actual
